# Regenerate the committed root package-lock.json so the uuid override in
# package.json is reflected in the lockfile. Run on demand from the Actions
# tab (workflow_dispatch). This is what actually closes the uuid Dependabot
# alert: the release build applies the override only in an ephemeral runner
# and never commits the resulting lockfile.
name: Regenerate lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Resolve dependencies and rewrite the lockfile (overrides applied)
        run: npm install --package-lock-only
      - name: Commit the regenerated lockfile if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already up to date; nothing to commit."
          else
            git add package-lock.json
            git commit -m "Phase B5d2: regenerate lockfile to apply uuid override"
            git push
          fi
