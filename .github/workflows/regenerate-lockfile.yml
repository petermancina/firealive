# Regenerate the committed root package-lock.json so the scoped uuid override
# in package.json is reflected in the lockfile, then open a pull request with
# the change. Run on demand from the Actions tab (workflow_dispatch).
#
# The release build applies the override only in an ephemeral runner and never
# commits the resulting lockfile, so without this the transitive uuid Dependabot
# alert stays open. main is protected, so this job opens a PR rather than
# pushing directly -- a PR is the only way an automated job can land a change
# on a protected branch.
name: Regenerate lockfile

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Resolve dependencies and rewrite the lockfile (overrides applied)
        run: npm install --ignore-scripts
      - name: Open a PR if the lockfile changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-ok lock.json is already up to date; nothing to do."
            exit 0
          fi
          branch="chore/regenerate-lockfile-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add package-lock.json
          git commit -m "Regenerate package-lock.json to apply uuid override"
          git push origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Regenerate lockfile to apply uuid override" \
            --body "Automated. Regenerates package-lock.json so the scoped uuid override in package.json is reflected in the committed lockfile (uuid moves to 11.1.1 for the Google Cloud SDK packages, the only uuid consumers). Merging this is what clears the transitive uuid Dependabot alert."
