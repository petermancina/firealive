          ( cd packages/global-dashboard-server && npm install --omit=dev && npx @electron/rebuild --version "$ELECTRON_VERSION" --only better-sqlite3 )
      - run: cd packages/analyst-client && npm install && npx esbuild analyst-client.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never
      - run: cd packages/global-dashboard && npm install && npx esbuild global-dashboard.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never
      - run: cd frontend && npm install && npx esbuild firealive-mc.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v7
        with:
