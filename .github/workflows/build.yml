name: Build & Release FireAlive

on:
  push:
    tags: ['v*']

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd packages/analyst-client && npm install && CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --publish never || true
      - run: cd packages/global-dashboard && npm install && CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --publish never || true
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: |
            packages/*/dist/*.dmg
            packages/*/dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd packages/analyst-client && npm install && npx electron-builder --win --publish never
      - run: cd packages/global-dashboard && npm install && npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: win-installers
          path: packages/*/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd packages/analyst-client && npm install && npx electron-builder --linux --publish never
      - run: cd packages/global-dashboard && npm install && npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: packages/*/dist/*.AppImage

  release:
    needs: [build-mac, build-windows, build-linux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            mac-installers/**/*
            win-installers/**/*
            linux-installers/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
