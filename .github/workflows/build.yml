name: Build & Release FireAlive

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Verify config-lock registry coverage
        run: node scripts/check-config-lock-coverage.js
      - name: Verify request-body validation coverage
        run: node scripts/check-body-validation-coverage.js
      - name: Verify Tier-1 column registry coverage and sync
        run: node scripts/check-tier1-registry-coverage.js
      - name: Verify Tier-1 seal round-trip
        run: node scripts/check-tier1-seal-roundtrip.js
      - name: Verify Tier-1 single-writer guard (self-test)
        run: node scripts/check-tier1-single-writer.js --self-test
      - name: Verify Tier-1 single-writer guard
        run: node scripts/check-tier1-single-writer.js
      - name: Verify shared-KEK boot reload
        run: node scripts/check-shared-kek-boot-reload.js
      - name: Verify fuse high-water anti-rollback
        run: node scripts/check-fuse-high-water.js
      - name: Verify deployment-mode seal
        run: node scripts/check-deployment-mode-seal.js
      - name: Verify HA un-pair flow
        run: node scripts/check-ha-unpair.js
      - name: Verify Tier-1 boot integrity gate
        run: node scripts/check-tier1-boot-gate.js
      - name: Verify Key-Operation Authorization (KOA)
        run: node scripts/check-koa.js
      - name: Verify offline node rekey
        run: node scripts/check-rekey.js
      - name: Verify seal-format versioning
        run: node scripts/check-seal-version.js
      - name: Verify import rekey
        run: node scripts/check-import-rekey.js
      - name: Verify macOS preflight
        run: node scripts/check-macos-preflight.js


  build-mac:
    needs: coverage
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install
      - run: cp packages/shared/signal-e2ee.js packages/analyst-client/signal-e2ee.js && cp packages/shared/signal-e2ee.js frontend/signal-e2ee.js && cp packages/shared/abuse-seal.js packages/analyst-client/abuse-seal.js && cp packages/shared/abuse-seal.js frontend/abuse-seal.js
      - run: cd packages/analyst-client && npm install && npx esbuild analyst-client.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --mac --publish never
      - run: cd packages/global-dashboard && npm install && npx esbuild global-dashboard.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --mac --publish never
      - run: cd frontend && npm install && npx esbuild firealive-mc.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mac-installers
          path: |
            packages/*/dist/*.dmg
            packages/*/dist/*.zip
            frontend/dist/*.dmg
            frontend/dist/*.zip
          if-no-files-found: warn

  build-windows:
    needs: coverage
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install
      - run: cp packages/shared/signal-e2ee.js packages/analyst-client/signal-e2ee.js && cp packages/shared/signal-e2ee.js frontend/signal-e2ee.js && cp packages/shared/abuse-seal.js packages/analyst-client/abuse-seal.js && cp packages/shared/abuse-seal.js frontend/abuse-seal.js
        shell: bash
      - run: cd packages/analyst-client && npm install && npx esbuild analyst-client.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --win --publish never
        shell: bash
      - run: cd packages/global-dashboard && npm install && npx esbuild global-dashboard.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --win --publish never
        shell: bash
      - run: cd frontend && npm install && npx esbuild firealive-mc.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --win --publish never
        shell: bash
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: win-installers
          path: |
            packages/*/dist/*.exe
            frontend/dist/*.exe
          if-no-files-found: warn

  build-linux:
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install
      - run: cp packages/shared/signal-e2ee.js packages/analyst-client/signal-e2ee.js && cp packages/shared/signal-e2ee.js frontend/signal-e2ee.js && cp packages/shared/abuse-seal.js packages/analyst-client/abuse-seal.js && cp packages/shared/abuse-seal.js frontend/abuse-seal.js
      - run: cd packages/analyst-client && npm install && npx esbuild analyst-client.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never
      - run: cd packages/global-dashboard && npm install && npx esbuild global-dashboard.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never
      - run: cd frontend && npm install && npx esbuild firealive-mc.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            packages/*/dist/*.AppImage
            frontend/dist/*.AppImage

  release:
    needs: [build-mac, build-windows, build-linux]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        continue-on-error: true
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            **/*.dmg
            **/*.zip
            **/*.exe
            **/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
