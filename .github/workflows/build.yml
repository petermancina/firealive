name: Build & Release FireAlive

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: cd packages/analyst-client && npm install && npx electron-builder --mac --publish never || true
      - run: cd packages/global-dashboard && npm install && npx electron-builder --mac --publish never || true
      - run: cd frontend && npm install && npx electron-builder --mac --publish never || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mac-installers
          path: |
            packages/*/dist/*.dmg
            packages/*/dist/*.zip
            frontend/dist/*.dmg
            frontend/dist/*.zip
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: cd packages/analyst-client && npm install && npx electron-builder --win --publish never || true
        shell: bash
      - run: cd packages/global-dashboard && npm install && npx electron-builder --win --publish never || true
        shell: bash
      - run: cd frontend && npm install && npx electron-builder --win --publish never || true
        shell: bash
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: win-installers
          path: |
            packages/*/dist/*.exe
            frontend/dist/*.exe
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: cd packages/analyst-client && npm install && npx electron-builder --linux --publish never
      - run: cd packages/global-dashboard && npm install && npx electron-builder --linux --publish never
      - run: cd frontend && npm install && npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            packages/*/dist/*.AppImage
            frontend/dist/*.AppImage

  release:
    needs: [build-mac, build-windows, build-linux]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            **/*.dmg
            **/*.zip
            **/*.exe
            **/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
