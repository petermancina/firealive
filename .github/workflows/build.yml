name: Build & Release FireAlive

# Triggers. Until P1-3 this workflow fired ONLY on a tag push, which meant every
# gate below ran after the merge, at release time -- so no gate had ever blocked
# a pull request in this repository's history. CodeQL (GitHub default setup, no
# workflow file) was the only PR-time check.
#
# The builds stay tag-only: a pull request pays for `coverage` on one ubuntu
# runner, not nine electron-builder invocations across three operating systems.
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

# Least privilege. This was `contents: write` at the top level, applying to every
# job including ones that only read source. Only `release` writes. With a
# pull_request trigger now present, that distinction stops being cosmetic.
permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Verify config-lock registry coverage
        run: node scripts/check-config-lock-coverage.js
      - name: Verify request-body validation coverage
        run: node scripts/check-body-validation-coverage.js
      - name: Verify Tier-1 column registry coverage and sync
        run: node scripts/check-tier1-registry-coverage.js
      - name: Verify Tier-1 seal round-trip
        run: node scripts/check-tier1-seal-roundtrip.js
      - name: Verify Tier-1 single-writer guard (self-test)
        run: node scripts/check-tier1-single-writer.js --self-test
      - name: Verify Tier-1 single-writer guard
        run: node scripts/check-tier1-single-writer.js
      - name: Verify shared-KEK boot reload
        run: node scripts/check-shared-kek-boot-reload.js
      - name: Verify fuse high-water anti-rollback
        run: node scripts/check-fuse-high-water.js
      - name: Verify rollback containment
        run: node scripts/check-rollback-containment.js
      - name: Verify manifest consistency
        run: node scripts/check-manifest-consistency.js
      - name: Verify deployment-mode seal
        run: node scripts/check-deployment-mode-seal.js
      - name: Verify HA un-pair flow
        run: node scripts/check-ha-unpair.js
      - name: Verify Tier-1 boot integrity gate
        run: node scripts/check-tier1-boot-gate.js
      - name: Verify Key-Operation Authorization (KOA)
        run: node scripts/check-koa.js
      - name: Verify offline node rekey
        run: node scripts/check-rekey.js
      - name: Verify seal-format versioning
        run: node scripts/check-seal-version.js
      - name: Verify import rekey
        run: node scripts/check-import-rekey.js
      - name: Verify macOS preflight
        run: node scripts/check-macos-preflight.js
      - name: Verify no recovery-substitute claims in docs
        run: node scripts/check-no-recovery-substitute-claims.js
      - name: Verify legacy TOTP/2FA stays removed
        run: node scripts/check-no-legacy-2fa.js
      # The 18th gate. Two steps, matching the single-writer guard above: the
      # self-test proves the detector goes red on a planted defect on EVERY run,
      # rather than once in a pull request that then closes.
      - name: Verify no bundle-relative data paths (self-test)
        run: node scripts/check-no-bundle-relative-data-paths.js --self-test
      - name: Verify no bundle-relative data paths
        run: node scripts/check-no-bundle-relative-data-paths.js
      # The 19th gate (P1-6): both servers' code-integrity checks -- exports
      # present (the GD's absence was FATAL 5b), the manifest covers every
      # scanned directory, a modified file is detected, and a missing manifest is
      # fail-closed. Exercised against isolated temp sandboxes, so the working
      # tree is untouched.
      - name: Verify code-integrity checks (both servers)
        run: node scripts/check-integrity.js
      # The 20th gate (pre-N2): the release pipeline's own correctness. The
      # phantom `**/*.zip` in the release `files:` list -- producible by no build
      # target -- failed the v1.0.85 publish under fail_on_unmatched_files. This
      # proves every release glob is producible AND that the G1/G2 fixes stay in
      # place: release needs coverage+smoke+posture-windows, and a PR triggers CI.
      # Two steps, self-test first, matching the single-writer and 18th-gate pattern.
      - name: Verify workflow validity (self-test)
        run: node scripts/check-workflow-validity.js --self-test
      - name: Verify workflow validity
        run: node scripts/check-workflow-validity.js
      # The 21st gate (pre-N2): the lockfile carries a node-llama-cpp prebuilt for
      # EVERY platform the MC and AC ship to, so a Dependabot bump cannot silently
      # drop one and leave that platform's app with no model binding; and
      # @mongodb-js/zstd (backup compression) stays declared with its
      # prebuild-install fetch mechanism intact.
      - name: Verify native-module completeness (self-test)
        run: node scripts/check-native-modules.js --self-test
      - name: Verify native-module completeness
        run: node scripts/check-native-modules.js
      # The 22nd gate (N2): the on-device behavioral baseliner's load-bearing
      # invariants -- fixed 90-day window, establishing-unscored, frozen against
      # upward drift, downward re-establish only when in-band, and drift measured
      # vs the frozen base. baseliner.js is the exact renderer math (bundled into
      # the AC's app.js); a refactor toward a rolling/self-refitting mean would
      # ship green without this gate.
      - name: Verify baseliner invariants (self-test)
        run: node scripts/check-baseliner-invariants.js --self-test
      - name: Verify baseliner invariants
        run: node scripts/check-baseliner-invariants.js


  # The first thing in this repository that launches the product. Runs on every
  # pull request and every tag -- NOT tag-only like the builds, because a
  # packaging defect must be caught before the merge, which is the whole reason
  # six of them shipped.
  #
  # It builds Linux only. That is not a gap: FATAL 1, 2, 4, 6 and 7 are
  # platform-independent (a spawn target, a require specifier, a data path, a
  # missing schema), and FATAL 3 is Linux-specific by nature -- the AppImage IS
  # the read-only mount. macOS and Windows are covered at tag time by build-mac
  # and build-windows, whose electron-builder invocations are identical.
  smoke:
    needs: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      # Electron needs a display. xvfb-run supplies one; --no-sandbox is set by
      # the harness because a runner has no user namespaces for Chromium's
      # sandbox. Neither weakens the product: all three apps set sandbox: true
      # in webPreferences regardless, and that is what ships.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npm install
      # pre-N2: prove the two native N-API addons LOAD and function on this
      # platform -- not merely that a prebuilt is present (check-native-modules)
      # or that a .node shipped (asserted on the artifact below). getLlama() loads
      # llama.cpp's CPU backend; the zstd step compresses and decompresses a
      # buffer and checks it survived. build.yml's note that these modules "load
      # under Electron without a rebuild" was an assertion -- this tests it.
      - name: Probe the native N-API modules load
        run: node scripts/probe-native-modules.js
      # P1-5: install each embedded server's production dependencies and rebuild its ONE
      # boot-critical native module -- better-sqlite3 -- for THIS runner's Electron ABI, so the
      # packaged server (spawned under ELECTRON_RUN_AS_NODE, i.e. Electron's Node, not system
      # Node) can load it at boot in initDb. The rebuild runs from INSIDE each server directory
      # so it targets that directory's node_modules -- the copy that ships via extraResources --
      # and is scoped with --only better-sqlite3: node-llama-cpp and @mongodb-js/zstd are N-API
      # and load under Electron without a node-gyp rebuild, while cpu-features (an OPTIONAL ssh2
      # acceleration native whose bundled nan cannot compile against Electron 43's V8) is left
      # alone -- ssh2 falls back to pure-JS crypto, so it is skipped, not degraded.
      - name: Install and Electron-ABI-rebuild the embedded servers
        shell: bash
        run: |
          ELECTRON_VERSION=$(node -p "require('./node_modules/electron/package.json').version")
          echo "Rebuilding embedded-server native modules for Electron $ELECTRON_VERSION"
          ( cd server && npm install --omit=dev && npx @electron/rebuild --version "$ELECTRON_VERSION" --only better-sqlite3 )
          ( cd packages/global-dashboard-server && npm install --omit=dev && npx @electron/rebuild --version "$ELECTRON_VERSION" --only better-sqlite3 )

      # P1-6 (FATAL 5a/5b): generate BOTH servers' code-integrity manifests before
      # electron-builder packs them. The manifest hashes the .js source and ships
      # inside each server dir (server/, global-dashboard-server/), so it must
      # exist before extraResources copies the dir. Generated here from the exact
      # tree that gets packed, so the shipped manifest matches the shipped code --
      # otherwise the smoke's boot integrity gate would go red at boot step 1.
      - name: Generate code-integrity manifests
        run: |
          set -euo pipefail
          node server/services/integrity.js --generate
          node packages/global-dashboard-server/services/gd-integrity.js --generate

      - name: Build the three Linux apps
        run: |
          set -euo pipefail
          cd packages/analyst-client && npm install && npx esbuild analyst-client.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never && cd ../..
          cd packages/global-dashboard && npm install && npx esbuild global-dashboard.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never && cd ../..
          cd frontend && npm install && npx esbuild firealive-mc.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --linux --publish never && cd ..

      # --appimage-extract rather than executing the AppImage directly: Ubuntu
      # 22.04+ ships FUSE 3 and an AppImage needs FUSE 2, so a direct run needs
      # a privileged `apt-get install libfuse2`. Extraction needs nothing.
      # The Analyst Client targets arch: [x64, arm64] where the MC and GD target
      # x64 only, so its dist/ holds TWO AppImages. An earlier version of this
      # step used `find ... | head -1`, which deterministically picked the arm64
      # one (`-arm64.AppImage` sorts before `.AppImage`) and died with
      # "cannot execute binary file: Exec format error" on an x64 runner.
      #
      # The fix is not to pick the right one. `head -1` silently selects one of
      # N and reports success -- the same shape as every defect this phase
      # exists to kill. This asserts there is EXACTLY ONE runner-arch AppImage
      # and fails loud otherwise, so a future arch change is a red build rather
      # than a coin flip.
      - name: Extract the AppImages
        run: |
          set -euo pipefail
          for d in frontend packages/global-dashboard packages/analyst-client; do
            imgs=$(find "$d/dist" -maxdepth 1 -name '*.AppImage' ! -name '*arm64*' ! -name '*armv7l*' ! -name '*i386*')
            n=$(printf '%s' "$imgs" | grep -c . || true)
            if [ "$n" -ne 1 ]; then
              echo "expected exactly 1 x64 AppImage in $d/dist, found $n:"
              find "$d/dist" -maxdepth 1 -name '*.AppImage' || true
              exit 1
            fi
            echo "extracting $imgs"
            ( cd "$d/dist" && chmod +x "$(basename "$imgs")" && "./$(basename "$imgs")" --appimage-extract >/dev/null )
            test -x "$d/dist/squashfs-root/AppRun" || { echo "no AppRun after extracting $imgs"; exit 1; }
          done

      # P1-5: the boot smoke below proves better-sqlite3 LOADS (initDb's new Database
      # succeeds), but a failed ship or a wrong-ABI rebuild would surface there as a cryptic
      # MODULE_NOT_FOUND or a native-load error. This asserts the earlier, legible fact
      # directly -- each embedded server shipped a node_modules carrying its boot-critical
      # native module -- so a packaging regression is named at the point it happened.
      - name: Assert the embedded servers shipped their dependencies
        run: |
          set -euo pipefail
          check() {
            local dir="$1" name="$2" natives="$3"
            if [ ! -d "$dir/node_modules" ]; then
              echo "$name: node_modules NOT shipped at $dir/node_modules"
              root="${dir%/resources/*}"
              echo "--- ls $root ---"; ls -la "$root" 2>&1 | head -40
              echo "--- ls $root/resources ---"; ls -la "$root/resources" 2>&1 | head -60
              echo "--- ls $dir ---"; ls -la "$dir" 2>&1 | head -60
              echo "--- node_modules dirs under $root ---"; find "$root" -maxdepth 6 -type d -name node_modules 2>/dev/null | head -40
              echo "--- better-sqlite3 dirs under $root ---"; find "$root" -maxdepth 7 -type d -name better-sqlite3 2>/dev/null | head -40
              exit 1
            fi
            # $3 = space-separated "<label>:<path-substring>" specs; the shipped
            # tree must hold a *.node whose path matches *<substring>*. llama's
            # binding lives in @node-llama-cpp/<platform>, not in node-llama-cpp/
            # itself, so it is matched by the path substring "llama" rather than a
            # package dir. better-sqlite3 and @mongodb-js/zstd match their own dirs.
            for spec in $natives; do
              label="${spec%%:*}"; hint="${spec#*:}"
              test -n "$(find "$dir/node_modules" -path "*$hint*" -name '*.node' -print -quit)" \
                || { echo "$name: $label native .node missing (no *.node on a path matching *$hint*) -- it did not ship, or its ABI build did not run"; exit 1; }
            done
            echo "$name: shipped native modules present -- $natives"
          }
          # Regional Server ships all three: better-sqlite3 (DB), node-llama-cpp
          # (inference), @mongodb-js/zstd (backup compression). GD server ships
          # only better-sqlite3 -- it runs neither inference nor backup-archive.
          check frontend/dist/squashfs-root/resources/server "Regional Server" "better-sqlite3:better-sqlite3 node-llama-cpp:llama zstd:@mongodb-js/zstd"
          check packages/global-dashboard/dist/squashfs-root/resources/global-dashboard-server "GD server" "better-sqlite3:better-sqlite3"

      # pre-N2: the Analyst Client loads node-llama-cpp via ESM import() from a
      # utilityProcess. import() cannot resolve a package from inside app.asar
      # (electron/electron#38957), so the fix runs model-utility.js from the
      # UNPACKED tree with node-llama-cpp unpacked beside it. Reasoning is not
      # proof: this loads it from that exact packaged layout. A bare-specifier
      # import() run with cwd set to the AC's unpacked tree resolves node-llama-cpp
      # from unpacked/node_modules -- exactly how model-utility.js resolves it --
      # and getLlama() loads the CPU backend with no model file. The two presence
      # tests name a packaging regression legibly before the load.
      #
      # Run under the runner's Node, not the extracted Electron binary: the app's
      # AppRun injects --no-sandbox (a Chromium flag) which Node rejects under
      # ELECTRON_RUN_AS_NODE, and node-llama-cpp is N-API (ABI-stable), so a Node
      # load is equivalent for load purposes -- the substantive check here is that
      # the AC's unpacked packaging resolves the import, which is venue-independent.
      - name: Probe node-llama-cpp loads in the packaged Analyst Client
        run: |
          set -euo pipefail
          AC="$PWD/packages/analyst-client/dist/squashfs-root"
          UNPACK="$AC/resources/app.asar.unpacked"
          test -e "$UNPACK/node_modules/node-llama-cpp/package.json" \
            || { echo "AC: node-llama-cpp is NOT unpacked (asarUnpack node_modules/node-llama-cpp/** missing)"; exit 1; }
          test -e "$UNPACK/model-utility.js" \
            || { echo "AC: model-utility.js is NOT unpacked -- the ESM importer must be on real fs, import() cannot cross the asar boundary"; exit 1; }
          printf '%s\n' \
            "const { getLlama } = await import('node-llama-cpp');" \
            "const llama = await getLlama();" \
            "if (!llama || typeof llama !== 'object') { console.error('getLlama() returned no instance'); process.exit(3); }" \
            "console.log('AC packaged: node-llama-cpp import() + getLlama() OK');" \
            > "$UNPACK/ac-llama-probe.mjs"
          ( cd "$UNPACK" && node ac-llama-probe.mjs )

      # FATAL 3's PREMISE, verified on the real artifact rather than reasoned.
      #
      # FATAL 3 says an AppImage is a read-only squashfs mount, which is why the
      # pre-P1 database -- computed to <install>/resources/data/ -- could never
      # be created on Linux. Every P1 assertion above tests the CONSEQUENCE (the
      # data root resolves outside the bundle; zero files are written into it).
      # None tests the premise, and the smoke runs launch the EXTRACTED app,
      # which is an ordinary writable directory. So if the premise were false,
      # nothing here would notice.
      #
      # No FUSE needed: an AppImage is a plain squashfs image appended to an ELF
      # runtime, --appimage-offset prints where it starts, and a kernel loop
      # mount reads it directly. This is why the extract path could avoid
      # libfuse2 and this step still cannot be skipped for the same reason.
      #
      # The mount is deliberately NOT given -o ro. Mounting read-only and then
      # observing read-only proves the mount flag, not the filesystem. The
      # assertion is that a mount which did NOT ask for read-only is refused a
      # write anyway -- that is the squashfs driver, which is the premise.
      - name: Verify the AppImage mount is read-only (FATAL 3's premise)
        run: |
          set -euo pipefail
          img=$(find frontend/dist -maxdepth 1 -name '*.AppImage' ! -name '*arm64*')
          off=$("./$(basename "$img")" --appimage-offset 2>/dev/null || (cd frontend/dist && "./$(basename "$img")" --appimage-offset))
          if [ -z "$off" ]; then echo "--appimage-offset returned nothing; cannot locate the squashfs payload"; exit 1; fi
          echo "squashfs payload begins at byte $off"
          sudo mkdir -p /mnt/fa-probe
          sudo mount -o loop,offset="$off" "$img" /mnt/fa-probe
          test -f /mnt/fa-probe/AppRun || { echo "mounted, but no AppRun -- not the app payload"; sudo umount /mnt/fa-probe; exit 1; }
          if sudo touch /mnt/fa-probe/__write_probe 2>/dev/null; then
            sudo rm -f /mnt/fa-probe/__write_probe
            sudo umount /mnt/fa-probe
            echo "THE MOUNT ACCEPTED A WRITE. FATAL 3's premise is FALSE and the"
            echo "finding must be re-derived: an AppImage is not a read-only mount here."
            exit 1
          fi
          echo "ok  the mount refused a write with no -o ro asked for: FATAL 3's premise holds"
          sudo umount /mnt/fa-probe

      # Each asserts the boot ladder reaches the hardware refusal and nothing
      # earlier. The MC and GD are asserted differently because their servers
      # report differently -- see the harness header.
      - name: Smoke the Management Console
        run: xvfb-run -a node scripts/smoke-packaged-app.js mc frontend/dist/squashfs-root
      - name: Smoke the Global Dashboard
        run: xvfb-run -a node scripts/smoke-packaged-app.js gd packages/global-dashboard/dist/squashfs-root
      # NOTE: the AC's arm64 AppImage is built but NOT smoked -- a hosted x64
      # runner cannot execute it. That is a named gap, not an oversight: the
      # arch-independent fatals (1, 2, 4, 6, 7) are covered by the x64 run, and
      # closing it properly needs an arm64 runner.
      - name: Smoke the Analyst Client
        run: xvfb-run -a node scripts/smoke-packaged-app.js ac packages/analyst-client/dist/squashfs-root

      # P1-6 (FATAL 5a): prove the packaged Regional Server refuses tampering. The
      # integrity gate runs at boot step 1, before the hardware gate at step 4, so
      # on this TPM-less runner a CLEAN boot reaches the hardware refusal while a
      # TAMPERED boot halts earlier -- and that integrity halt lands in error.log
      # (logHaltAndExit writes to the log, not stderr). The shipped integrity
      # --verify CLI gives the crisp console signal; the boot check confirms the
      # gate is wired into startup and refuses.
      - name: Prove the packaged Regional Server refuses tampering
        run: |
          set -uo pipefail
          ROOT=frontend/dist/squashfs-root
          SRV=resources/server
          BIN=./firealive-management-console
          LOGS="$HOME/.firealive/regional-server/logs"
          VICTIM=$(cd "$ROOT/$SRV/routes" && ls *.js | head -1)
          echo "victim: $SRV/routes/$VICTIM"
          verify() { ( cd "$ROOT" && ELECTRON_RUN_AS_NODE=1 "$BIN" "$SRV/services/integrity.js" --verify ); }
          boot()   { ( cd "$ROOT" && ELECTRON_RUN_AS_NODE=1 NODE_ENV=production PORT=3000 timeout 40 "$BIN" "$SRV/index.js" ) >/dev/null 2>&1; }
          fail() { echo "FAIL: $1"; exit 1; }
          # (a) MODIFIED file: --verify flags it (console + non-zero)
          cp "$ROOT/$SRV/routes/$VICTIM" /tmp/rs.bak
          printf '\n// tamper\n' >> "$ROOT/$SRV/routes/$VICTIM"
          if verify >/tmp/rsv.out 2>&1; then cp /tmp/rs.bak "$ROOT/$SRV/routes/$VICTIM"; fail "--verify passed on a modified file"; fi
          grep -q "INTEGRITY VIOLATION" /tmp/rsv.out || { cp /tmp/rs.bak "$ROOT/$SRV/routes/$VICTIM"; fail "--verify did not report an integrity violation"; }
          # (b) MODIFIED file: the boot gate refuses (non-zero) with an integrity halt in error.log
          rm -f "$LOGS/error.log" "$LOGS/combined.log" 2>/dev/null || true
          if boot; then cp /tmp/rs.bak "$ROOT/$SRV/routes/$VICTIM"; fail "tampered Regional Server booted (exit 0)"; fi
          cp /tmp/rs.bak "$ROOT/$SRV/routes/$VICTIM"
          grep -qiE "Source files have been modified|INTEGRITY" "$LOGS/error.log" "$LOGS/combined.log" 2>/dev/null || { echo "--- error.log ---"; tail -20 "$LOGS/error.log" 2>/dev/null; fail "boot halt was not an integrity halt"; }
          echo "ok  modified file: --verify flagged it AND the boot gate refused"
          # (c) MISSING manifest: fail-closed at --verify and at boot
          mv "$ROOT/$SRV/integrity-manifest.json" /tmp/rs-mani.bak
          if verify >/tmp/rsv2.out 2>&1; then mv /tmp/rs-mani.bak "$ROOT/$SRV/integrity-manifest.json"; fail "--verify passed with no manifest"; fi
          rm -f "$LOGS/error.log" "$LOGS/combined.log" 2>/dev/null || true
          if boot; then mv /tmp/rs-mani.bak "$ROOT/$SRV/integrity-manifest.json"; fail "Regional Server booted with no manifest (exit 0)"; fi
          mv /tmp/rs-mani.bak "$ROOT/$SRV/integrity-manifest.json"
          grep -qiE "integrity manifest|HALTING" "$LOGS/error.log" "$LOGS/combined.log" 2>/dev/null || { echo "--- error.log ---"; tail -20 "$LOGS/error.log" 2>/dev/null; fail "missing-manifest boot halt not found"; }
          echo "ok  missing manifest: fail-closed at --verify AND at the boot gate"

      # P1-6 (FATAL 5b): prove the packaged GD Server refuses tampering. The GD
      # gate uses console.error (the GD has no logger), so the integrity halt
      # reaches stderr directly; same integrity-before-hardware ordering applies.
      - name: Prove the packaged GD Server refuses tampering
        run: |
          set -uo pipefail
          ROOT=packages/global-dashboard/dist/squashfs-root
          SRV=resources/global-dashboard-server
          BIN=./firealive-global-dashboard
          VICTIM=$(cd "$ROOT/$SRV/routes" && ls *.js | head -1)
          echo "victim: $SRV/routes/$VICTIM"
          verify() { ( cd "$ROOT" && ELECTRON_RUN_AS_NODE=1 "$BIN" "$SRV/services/gd-integrity.js" --verify ); }
          boot()   { ( cd "$ROOT" && ELECTRON_RUN_AS_NODE=1 NODE_ENV=production GD_PORT=4001 timeout 40 "$BIN" "$SRV/index.js" ); }
          fail() { echo "FAIL: $1"; exit 1; }
          # (a) MODIFIED file: --verify flags it
          cp "$ROOT/$SRV/routes/$VICTIM" /tmp/gd.bak
          printf '\n// tamper\n' >> "$ROOT/$SRV/routes/$VICTIM"
          if verify >/tmp/gdv.out 2>&1; then cp /tmp/gd.bak "$ROOT/$SRV/routes/$VICTIM"; fail "--verify passed on a modified file"; fi
          grep -q "INTEGRITY VIOLATION" /tmp/gdv.out || { cp /tmp/gd.bak "$ROOT/$SRV/routes/$VICTIM"; fail "--verify did not report an integrity violation"; }
          # (b) MODIFIED file: the boot gate refuses (non-zero) with an integrity halt on stderr
          if boot >/tmp/gdb.out 2>&1; then cp /tmp/gd.bak "$ROOT/$SRV/routes/$VICTIM"; fail "tampered GD Server booted (exit 0)"; fi
          cp /tmp/gd.bak "$ROOT/$SRV/routes/$VICTIM"
          grep -qiE "INTEGRITY|HALTING" /tmp/gdb.out || { echo "--- gd boot out ---"; tail -20 /tmp/gdb.out; fail "GD boot halt was not an integrity halt"; }
          echo "ok  modified file: --verify flagged it AND the boot gate refused"
          # (c) MISSING manifest: fail-closed at --verify and at boot
          mv "$ROOT/$SRV/integrity-manifest.json" /tmp/gd-mani.bak
          if verify >/tmp/gdv2.out 2>&1; then mv /tmp/gd-mani.bak "$ROOT/$SRV/integrity-manifest.json"; fail "--verify passed with no manifest"; fi
          if boot >/tmp/gdb2.out 2>&1; then mv /tmp/gd-mani.bak "$ROOT/$SRV/integrity-manifest.json"; fail "GD Server booted with no manifest (exit 0)"; fi
          mv /tmp/gd-mani.bak "$ROOT/$SRV/integrity-manifest.json"
          grep -qiE "integrity manifest|HALTING" /tmp/gdb2.out || { echo "--- gd boot out ---"; tail -20 /tmp/gdb2.out; fail "missing-manifest GD boot halt not found"; }
          echo "ok  missing manifest: fail-closed at --verify AND at the boot gate"

      # Diagnostic: on ANY smoke failure, run the Regional Server the exact way the MC
      # spawns it (ELECTRON_RUN_AS_NODE) so its own stdout/stderr -- the crash the harness
      # only counts as bytes -- prints directly, with no Electron or xvfb noise. Never runs
      # on success; head-capped and timed out so it cannot hang the job.
      - name: Diagnostic - run the Regional Server directly on failure
        if: failure()
        run: |
          echo "=== resources/server/index.js via ELECTRON_RUN_AS_NODE (server output only) ==="
          ( cd frontend/dist/squashfs-root && ELECTRON_RUN_AS_NODE=1 NODE_ENV=production PORT=3000 timeout 30 ./firealive-management-console resources/server/index.js ) 2>&1 | head -200 || true
          echo "=== end direct run ==="

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-logs
          path: |
            ~/.firealive/regional-server/logs/*.log
            /home/runner/.firealive/regional-server/logs/*.log
          if-no-files-found: ignore


  # The FIRST time any FireAlive code executes on Windows in CI.
  #
  # Windows has had no file-permission control at all: process.umask is a no-op
  # and Node's mode is ignored except the read-only bit, so P1-2a and P1-2b
  # bought POSIX only and the posture check is the ONLY control there.
  #
  # It is a separate job rather than a step in coverage because coverage is
  # ubuntu-latest and this branch cannot execute there -- the script skips
  # loudly on any other platform so a green ubuntu run is never mistaken for
  # Windows coverage.
  #
  # It is NOT tag-only. The whole point of the pull_request trigger is that a
  # branch nothing can execute is a branch nothing verifies, and before this
  # job the only windows-latest runner in this workflow was build-windows,
  # which fires on a tag and only builds.
  #
  # No npm install: like every other gate, it runs on the standard library.
  posture-windows:
    needs: coverage
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Execute the Windows ACL branch and prove it goes red
        run: node scripts/check-windows-posture.js

  build-mac:
    needs: coverage
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm install
      # P1-5: install each embedded server's production dependencies and rebuild its ONE
      # boot-critical native module -- better-sqlite3 -- for THIS runner's Electron ABI, so the
      # packaged server (spawned under ELECTRON_RUN_AS_NODE, i.e. Electron's Node, not system
      # Node) can load it at boot in initDb. The rebuild runs from INSIDE each server directory
      # so it targets that directory's node_modules -- the copy that ships via extraResources --
      # and is scoped with --only better-sqlite3: node-llama-cpp and @mongodb-js/zstd are N-API
      # and load under Electron without a node-gyp rebuild, while cpu-features (an OPTIONAL ssh2
      # acceleration native whose bundled nan cannot compile against Electron 43's V8) is left
      # alone -- ssh2 falls back to pure-JS crypto, so it is skipped, not degraded.
      - name: Install and Electron-ABI-rebuild the embedded servers
        shell: bash
        run: |
          ELECTRON_VERSION=$(node -p "require('./node_modules/electron/package.json').version")
          echo "Rebuilding embedded-server native modules for Electron $ELECTRON_VERSION"
          ( cd server && npm install --omit=dev && npx @electron/rebuild --version "$ELECTRON_VERSION" --only better-sqlite3 )
          ( cd packages/global-dashboard-server && npm install --omit=dev && npx @electron/rebuild --version "$ELECTRON_VERSION" --only better-sqlite3 )
      - run: cd packages/analyst-client && npm install && npx esbuild analyst-client.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --mac --publish never
      - run: cd packages/global-dashboard && npm install && npx esbuild global-dashboard.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --mac --publish never
      - run: cd frontend && npm install && npx esbuild firealive-mc.jsx --bundle --format=iife --jsx=automatic --minify --outfile=app.js && npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mac-installers
          path: |
            packages/*/dist/*.dmg
            frontend/dist/*.dmg
          if-no-files-found: warn

  build-windows:
    needs: coverage
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
