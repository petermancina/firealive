      # Node) can load it at boot in initDb. The rebuild runs from INSIDE each server directory
      # so it targets that directory's node_modules -- the copy that ships via extraResources --
      # and is scoped with --only better-sqlite3: node-llama-cpp and @mongodb-js/zstd are N-API
      # and load under Electron without a node-gyp rebuild, while cpu-features (an OPTIONAL ssh2
      # acceleration native whose bundled nan cannot compile against Electron 43's V8) is left
