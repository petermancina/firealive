# ═══════════════════════════════════════════════════════════════════════════════
# FIREALIVE — Docker Compose
# Run: docker-compose up -d
# Access: http://localhost:3000
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  firealive:
    build: .
    container_name: firealive
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - firealive-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/firealive.db
      - BACKUP_PATH=/app/data/backups
      - LOG_PATH=/app/data/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/system', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  firealive-data:
    driver: local
